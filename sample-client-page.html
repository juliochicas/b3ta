<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>IM Producciones — Reportes</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect x='10' y='20' width='20' height='60' fill='%23F5A623'/><text x='50' y='75' font-size='60' font-weight='bold' fill='%23CC0000' text-anchor='middle'>M</text></svg>">
<style>
  :root {
    --yellow: #F5A623;
    --red: #CC0000;
    --dark: #1A1A1A;
    --gray: #6B7280;
    --light-gray: #F7F7F8;
    --white: #FFFFFF;
    --border: #E5E7EB;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', system-ui, sans-serif;
    background: var(--white);
    color: var(--dark);
    min-height: 100dvh;
    display: flex;
    justify-content: center;
    -webkit-font-smoothing: antialiased;
  }

  #app {
    width: 100%;
    max-width: 520px;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    background: var(--white);
    position: relative;
  }

  /* Header */
  .header {
    padding: 12px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
    background: var(--white);
    position: sticky;
    top: 0;
    z-index: 50;
  }
  .header-left { display: flex; align-items: center; gap: 10px; }
  .header-title { font-size: 15px; font-weight: 700; }
  .btn-reports {
    background: var(--light-gray); border: none; border-radius: 10px;
    padding: 8px 14px; font-size: 12px; font-weight: 600;
    color: var(--dark); cursor: pointer; font-family: inherit;
  }
  .btn-reports:active { background: var(--border); }

  /* Progress Steps */
  .progress { padding: 14px 20px 0; display: flex; gap: 5px; }
  .step-btn {
    flex: 1; padding: 8px 2px; border-radius: 10px; border: none;
    font-size: 11px; font-weight: 600; cursor: pointer;
    font-family: inherit; transition: all 0.25s ease;
    display: flex; flex-direction: column; align-items: center; gap: 2px;
  }
  .step-btn .step-icon { font-size: 15px; }
  .step-btn.active { background: var(--dark); color: var(--white); }
  .step-btn.done { background: rgba(245,166,35,0.15); color: var(--dark); }
  .step-btn.pending { background: var(--light-gray); color: var(--gray); }

  /* Content */
  .content { flex: 1; padding: 24px 20px 20px; overflow-y: auto; }
  .content h2 { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
  .content .subtitle { font-size: 13px; color: var(--gray); margin-bottom: 24px; }

  /* Form Elements */
  .field { margin-bottom: 18px; }
  .field-label {
    display: block; font-size: 11px; font-weight: 700; color: var(--gray);
    text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 6px;
  }
  .field-input, .field-textarea {
    width: 100%; padding: 12px 14px; border-radius: 12px;
    border: 1.5px solid var(--border); font-size: 15px;
    font-family: inherit; outline: none; background: var(--white);
    transition: border-color 0.2s;
  }
  .field-input:focus, .field-textarea:focus { border-color: var(--yellow); }
  .field-textarea { resize: vertical; min-height: 60px; }
  .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  /* Checkbox */
  .checkbox-row {
    display: flex; align-items: center; gap: 12px;
    padding: 14px 16px; border-radius: 12px; background: var(--light-gray);
    margin-top: 8px; cursor: pointer;
  }
  .checkbox-row input[type="checkbox"] { width: 20px; height: 20px; accent-color: var(--red); cursor: pointer; }
  .checkbox-row span { font-size: 14px; }

  /* Cards */
  .card {
    margin-bottom: 16px; padding: 16px; border-radius: 16px;
    background: var(--light-gray); position: relative;
  }
  .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
  .card-label { font-size: 13px; font-weight: 700; color: var(--red); }

  /* Comment Item */
  .comment-item { display: flex; gap: 8px; margin-bottom: 10px; align-items: flex-start; }
  .comment-bullet { font-weight: 700; font-size: 18px; margin-top: 8px; flex-shrink: 0; line-height: 1; }
  .comment-bullet.yellow { color: var(--yellow); }
  .comment-bullet.red { color: var(--red); }
  .comment-item .field { flex: 1; margin-bottom: 0; }

  /* Photo Grid */
  .photo-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 16px; }
  .photo-cell {
    position: relative; padding-top: 100%; border-radius: 12px;
    overflow: hidden; background: var(--light-gray);
  }
  .photo-cell img {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover;
  }
  .photo-remove {
    position: absolute; top: 5px; right: 5px; width: 26px; height: 26px;
    border-radius: 13px; background: rgba(0,0,0,0.55); color: #fff;
    border: none; font-size: 13px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }
  .photo-add {
    padding-top: 100%; position: relative; border-radius: 12px;
    border: 2px dashed var(--border); background: transparent;
    cursor: pointer;
  }
  .photo-add-inner {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
  }
  .photo-add-inner .icon { font-size: 30px; margin-bottom: 4px; }
  .photo-add-inner .label { font-size: 11px; color: var(--gray); font-weight: 600; }
  .photo-count { font-size: 12px; color: var(--gray); text-align: center; margin-top: 12px; }

  /* Drop Zone */
  .drop-zone {
    border: 2.5px dashed var(--border); border-radius: 16px;
    padding: 32px 20px; text-align: center; cursor: pointer;
    transition: all 0.25s ease; background: var(--light-gray);
  }
  .drop-zone.dragover {
    border-color: var(--yellow); background: rgba(245,166,35,0.08);
    transform: scale(1.01);
  }
  .drop-zone-inner { pointer-events: none; }
  .drop-zone-btn {
    display: inline-block; padding: 8px 20px; border-radius: 10px;
    background: var(--red); color: var(--white); font-size: 13px;
    font-weight: 600;
  }

  /* Photo order badge */
  .photo-order {
    position: absolute; bottom: 5px; left: 5px; width: 22px; height: 22px;
    border-radius: 11px; background: rgba(0,0,0,0.55); color: #fff;
    font-size: 11px; font-weight: 700; display: flex;
    align-items: center; justify-content: center;
  }

  /* Drag states */
  .photo-cell[draggable="true"] { cursor: grab; }
  .photo-cell[draggable="true"]:active { cursor: grabbing; }
  .photo-cell.dragging { opacity: 0.4; transform: scale(0.95); }
  .photo-cell.drag-over { outline: 2.5px solid var(--yellow); outline-offset: -2px; }

  /* Buttons */
  .btn-add {
    width: 100%; padding: 14px; border-radius: 12px;
    border: 2px dashed var(--border); background: transparent;
    font-size: 14px; font-weight: 600; color: var(--gray);
    cursor: pointer; font-family: inherit; transition: background 0.2s;
  }
  .btn-add:active { background: var(--light-gray); }
  .btn-add-sm {
    padding: 8px 16px; border-radius: 10px;
    border: 1.5px dashed var(--border); background: transparent;
    font-size: 13px; font-weight: 600; color: var(--gray);
    cursor: pointer; font-family: inherit;
  }
  .btn-remove {
    background: none; border: none; font-size: 18px;
    cursor: pointer; color: var(--gray); padding: 4px 8px;
    line-height: 1;
  }
  .btn-remove:hover { color: var(--red); }

  /* Navigation */
  .nav-bar {
    padding: 12px 20px 20px; display: flex; gap: 10px;
    border-top: 1px solid var(--border); background: var(--white);
  }
  .btn-back {
    padding: 14px 20px; border-radius: 12px;
    border: 2px solid var(--border); background: transparent;
    font-size: 14px; font-weight: 600; color: var(--dark);
    cursor: pointer; font-family: inherit;
  }
  .btn-next {
    flex: 1; padding: 14px; border-radius: 12px; border: none;
    font-size: 14px; font-weight: 700; color: var(--white);
    cursor: pointer; font-family: inherit; transition: all 0.2s;
  }
  .btn-next.enabled { background: var(--red); }
  .btn-next.disabled { background: var(--border); color: var(--gray); cursor: not-allowed; }

  /* Preview Slides */
  .slide-card {
    background: var(--white); border-radius: 14px; overflow: hidden;
    box-shadow: 0 2px 16px rgba(0,0,0,0.07); margin-bottom: 18px;
    border: 1px solid var(--border);
  }
  .slide-header {
    padding: 6px 14px; background: var(--light-gray);
    display: flex; justify-content: space-between; align-items: center;
  }
  .slide-num { font-size: 10px; color: var(--gray); font-weight: 700; letter-spacing: 0.5px; }
  .slide-dots { display: flex; gap: 4px; }
  .slide-dots span { width: 8px; height: 8px; border-radius: 4px; }
  .slide-body {
    padding: 24px; aspect-ratio: 16 / 9; display: flex;
    flex-direction: column; justify-content: center; position: relative;
  }
  .slide-logo { position: absolute; top: 10px; right: 10px; }

  /* Preview Actions */
  .preview-actions { display: flex; gap: 10px; margin-top: 24px; }
  .btn-save {
    flex: 1; padding: 14px; border-radius: 12px;
    border: 2px solid var(--yellow); background: transparent;
    font-size: 14px; font-weight: 700; color: var(--dark);
    cursor: pointer; font-family: inherit;
  }
  .btn-export {
    flex: 1; padding: 14px; border-radius: 12px; border: none;
    background: var(--red); font-size: 14px; font-weight: 700;
    color: var(--white); cursor: pointer; font-family: inherit;
  }
  .preview-note { font-size: 11px; color: var(--gray); text-align: center; margin-top: 12px; }

  /* Reports List */
  .report-item {
    padding: 16px; border-radius: 14px; background: var(--light-gray);
    margin-bottom: 10px; display: flex; justify-content: space-between;
    align-items: center; cursor: pointer; transition: background 0.15s;
  }
  .report-item:active { background: var(--border); }
  .report-item-title { font-size: 15px; font-weight: 700; margin-bottom: 4px; }
  .report-item-meta { font-size: 12px; color: var(--gray); }
  .empty-state { text-align: center; padding: 50px 20px; color: var(--gray); }
  .empty-state .icon { font-size: 44px; margin-bottom: 10px; }
  .btn-new-report {
    width: 100%; margin-top: 20px; padding: 14px; border-radius: 12px;
    background: var(--red); border: none; font-size: 14px; font-weight: 700;
    color: var(--white); cursor: pointer; font-family: inherit;
  }

  /* Toast */
  .toast {
    position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%);
    padding: 10px 22px; border-radius: 12px; background: var(--dark);
    color: var(--white); font-size: 13px; font-weight: 600;
    box-shadow: 0 4px 24px rgba(0,0,0,0.25); z-index: 200;
    animation: toastIn 0.3s ease;
    white-space: nowrap;
  }
  @keyframes toastIn {
    from { opacity: 0; transform: translateX(-50%) translateY(12px); }
    to { opacity: 1; transform: translateX(-50%) translateY(0); }
  }

  /* Slide Preview Table */
  .slide-table { width: 100%; font-size: 9px; border-collapse: collapse; }
  .slide-table th {
    text-align: left; padding: 4px 6px; font-weight: 700;
    color: var(--gray); border-bottom: 1px solid var(--border); font-size: 8px;
    text-transform: uppercase;
  }
  .slide-table td { padding: 4px 6px; border-bottom: 1px solid var(--light-gray); font-size: 9px; }

  .slide-comment { display: flex; gap: 6px; margin-bottom: 5px; align-items: flex-start; }
  .slide-comment .bullet { font-weight: 700; flex-shrink: 0; font-size: 12px; line-height: 1.3; }
  .slide-comment p { font-size: 9px; line-height: 1.45; margin: 0; }

  .slide-photo-grid { display: grid; gap: 6px; height: 85%; }
  .slide-photo-grid img { width: 100%; height: 100%; object-fit: cover; border-radius: 6px; }

  /* Section Title */
  .section-title { font-size: 15px; font-weight: 700; color: var(--dark); margin-bottom: 14px; }

  /* Responsive tweaks */
  @media (max-width: 380px) {
    .step-btn { font-size: 10px; padding: 6px 2px; }
    .content h2 { font-size: 20px; }
  }

  /* Scroll */
  .content::-webkit-scrollbar { width: 0; }

  /* Print hidden */
  @media print { body { display: none; } }

  /* App Credit */
  .app-credit {
    text-align: center; padding: 14px 20px 20px; font-size: 11px;
    color: var(--gray); letter-spacing: 0.2px;
  }
  .app-credit a { color: var(--red); text-decoration: none; font-weight: 600; }
  .app-credit a:hover { text-decoration: underline; }
</style>

// ==================== STATE ====================
let state = {
  step: 0,
  showList: false,
  report: newReport(),
  savedReports: [],
  toast: null,
  toastTimer: null,
};

function newReport() {
  return {
    id: Date.now().toString(),
    marca: '', evento: '', lugar: '', semana: '', grupo: '', supervisor: '',
    fecha: new Date().toISOString().split('T')[0],
    tiendas: [{ fecha: '', horas: '', nombre: '', lugar: '', comentario: '' }],
    comentariosCliente: [''],
    comentariosTienda: [''],
    esSuperMercado: false,
    fotos: [],
  };
}

const ALL_STEPS = [
  { id: 'general', label: 'Datos', icon: '📋' },
  { id: 'tiendas', label: 'Tiendas', icon: '🏪' },
  { id: 'comentarios', label: 'Notas', icon: '💬' },
  { id: 'fotos', label: 'Fotos', icon: '📸' },
  { id: 'preview', label: 'Vista', icon: '👁' },
];

function getActiveSteps() {
  if (state.report.esSuperMercado) return ALL_STEPS;
  return ALL_STEPS.filter(s => s.id !== 'tiendas');
}

// ==================== STORAGE ====================
const STORAGE_KEY = 'im_producciones_reports';

function loadReports() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) state.savedReports = JSON.parse(raw);
  } catch(e) {}
}

function persistReports() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state.savedReports));
  } catch(e) {}
}

function saveReport() {
  const idx = state.savedReports.findIndex(r => r.id === state.report.id);
  if (idx >= 0) state.savedReports[idx] = JSON.parse(JSON.stringify(state.report));
  else state.savedReports.unshift(JSON.parse(JSON.stringify(state.report)));
  persistReports();
  showToast('Reporte guardado ✓');
}

function deleteReport(id) {
  state.savedReports = state.savedReports.filter(r => r.id !== id);
  persistReports();
  showToast('Eliminado');
  render();
}

// ==================== HELPERS ====================
function showToast(msg) {
  state.toast = msg;
  clearTimeout(state.toastTimer);
  render();
  state.toastTimer = setTimeout(() => { state.toast = null; render(); }, 2000);
}

function currentStepId() {
  const steps = getActiveSteps();
  return steps[state.step] ? steps[state.step].id : 'general';
}

function canGoNext() {
  const id = currentStepId();
  if (id === 'general') return state.report.marca.trim() && state.report.lugar.trim();
  return true;
}

function stepRenderers() {
  return { general: renderGeneral, tiendas: renderTiendas, comentarios: renderComentarios, fotos: renderFotos, preview: renderPreview };
}

function logoSVG(size = 28) {
  return `<img src="${LOGO_B64}" alt="IM Producciones" style="height:${size * 1.3}px;width:auto;object-fit:contain;">`;
}

function esc(str) {
  const d = document.createElement('div');
  d.textContent = str || '';
  return d.innerHTML;
}

// ==================== PHOTO HANDLING ====================
function processFiles(files) {
  let loaded = 0;
  files.forEach(file => {
    const reader = new FileReader();
    reader.onload = ev => {
      state.report.fotos.push({ data: ev.target.result, name: file.name });
      loaded++;
      if (loaded === files.length) render();
    };
    reader.readAsDataURL(file);
  });
}

function handlePhotoInput(e) {
  const files = Array.from(e.target.files).filter(f => f.type.startsWith('image/'));
  if (files.length) processFiles(files);
  e.target.value = '';
}

function removePhoto(idx) {
  state.report.fotos.splice(idx, 1);
  render();
}

// ==================== EXPORT ====================
function exportJSON() {
  const clone = JSON.parse(JSON.stringify(state.report));
  // Remove base64 photo data for lighter export, keep names
  clone.fotos = clone.fotos.map(f => ({ name: f.name }));
  const blob = new Blob([JSON.stringify(clone, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `reporte_${state.report.marca || 'sin_marca'}_${state.report.fecha}.json`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('JSON exportado ✓');
}

    const ct = r.comentariosTienda.filter(c => c.trim());
    if (ct.length) {
      html += `<div class="slide">${logoHTML}${footerHTML}<h3>Comentarios de Tienda</h3><div style="margin-top:20px">`;
      ct.forEach(c => { html += `<div class="comment red"><span class="bullet">•</span><p>${esc(c)}</p></div>`; });
      html += `</div></div>`;
    }
  }

  // Fotos
  if (r.fotos.length) {
    html += `<div class="slide"><div class="center"><h2 style="font-size:36px">FOTOGRAFÍAS DE LA<br>ACTIVIDAD</h2></div></div>`;
    for (let i = 0; i < r.fotos.length; i += 3) {
      const chunk = r.fotos.slice(i, i + 3);
      html += `<div class="slide">${logoHTML}${footerHTML}<div class="photos-grid" style="grid-template-columns:repeat(${chunk.length},1fr)">`;
      chunk.forEach(f => { html += `<img src="${f.data}" alt="">`; });
      html += `</div></div>`;
    }
  }

  // Slide final
  html += `<div class="slide">${logoHTML}${footerHTML}<div class="center"><p class="big">GRACIAS.</p></div></div>`;
  html += `</body></html>`;

  const blob = new Blob([html], { type: 'text/html' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `reporte_${r.marca || 'reporte'}_${r.fecha}.html`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('Reporte HTML exportado ✓');
}

function exportPPTX() {
  if (typeof PptxGenJS === 'undefined') {
    showToast('Error: pptxgenjs no cargó. Revisa tu conexión.');
    return;
  }

  const r = state.report;
  const pres = new PptxGenJS();
  pres.layout = 'LAYOUT_16x9';
  pres.author = 'IM Producciones';
  pres.title = `Reporte ${r.marca} - ${r.evento}`;

  const LOGO_DATA = LOGO_B64.replace('data:image/jpeg;base64,', 'image/jpeg;base64,');
  const logoOpts = { data: LOGO_DATA, x: 8.5, y: 0.2, h: 0.9, w: 0.9, sizing: { type: 'contain', w: 0.9, h: 0.9 } };
  const footerOpts = null;

  function addSlideBase(s) { s.addImage(logoOpts); }

  // ===== SLIDE 1: PORTADA =====
  let slide = pres.addSlide();
  slide.background = { color: 'FFFFFF' };
  addSlideBase(slide);

  if (r.evento) {
    slide.addText('EVENTO', { x: 1, y: 1.5, w: 8, h: 0.4, fontSize: 12, fontFace: 'Arial', color: '6B7280', align: 'center', bold: true, charSpacing: 3 });
    slide.addText(r.evento, { x: 1, y: 1.9, w: 8, h: 0.6, fontSize: 28, fontFace: 'Arial', color: '1A1A1A', align: 'center', bold: true });
  }
  slide.addText(r.marca, { x: 1, y: r.evento ? 2.5 : 2.0, w: 8, h: 0.5, fontSize: 20, fontFace: 'Arial', color: 'CC0000', align: 'center', bold: true });

  const metaParts = [];
  if (r.lugar) metaParts.push('📍 ' + r.lugar);
  if (r.fecha) metaParts.push('🗓 ' + r.fecha);
  if (r.semana) metaParts.push('📅 ' + r.semana);
  if (r.grupo) metaParts.push('👥 ' + r.grupo);
  if (r.supervisor) metaParts.push('🧑‍💼 ' + r.supervisor);
  if (metaParts.length) {
    slide.addText(metaParts.join('    '), { x: 1, y: 3.4, w: 8, h: 0.4, fontSize: 11, fontFace: 'Arial', color: '6B7280', align: 'center' });
  }

  // ===== SLIDE 2: TIENDAS (si hay) =====
  const tiendas = r.tiendas.filter(t => t.nombre || t.lugar);
  if (tiendas.length) {
    slide = pres.addSlide();
    slide.background = { color: 'FFFFFF' };
    addSlideBase(slide);
    slide.addText('Tiendas Apoyadas', { x: 0.6, y: 0.3, w: 7, h: 0.5, fontSize: 22, fontFace: 'Arial', color: 'CC0000', bold: true });

    const tableHeader = [
      { text: 'Fecha', options: { fill: { color: 'F7F7F8' }, color: '6B7280', bold: true, fontSize: 10, fontFace: 'Arial' } },
      { text: 'Horas', options: { fill: { color: 'F7F7F8' }, color: '6B7280', bold: true, fontSize: 10, fontFace: 'Arial' } },
      { text: 'Tienda', options: { fill: { color: 'F7F7F8' }, color: '6B7280', bold: true, fontSize: 10, fontFace: 'Arial' } },
      { text: 'Lugar', options: { fill: { color: 'F7F7F8' }, color: '6B7280', bold: true, fontSize: 10, fontFace: 'Arial' } },
      { text: 'Comentario', options: { fill: { color: 'F7F7F8' }, color: '6B7280', bold: true, fontSize: 10, fontFace: 'Arial' } },
    ];
    const tableRows = tiendas.map(t => [
      { text: t.fecha || '', options: { fontSize: 9, fontFace: 'Arial', color: '1A1A1A' } },
      { text: t.horas || '', options: { fontSize: 9, fontFace: 'Arial', color: '1A1A1A' } },
      { text: t.nombre || '', options: { fontSize: 9, fontFace: 'Arial', color: '1A1A1A', bold: true } },
      { text: t.lugar || '', options: { fontSize: 9, fontFace: 'Arial', color: '1A1A1A' } },
      { text: t.comentario || '', options: { fontSize: 9, fontFace: 'Arial', color: '6B7280' } },
    ]);

    slide.addTable([tableHeader, ...tableRows], {
      x: 0.5, y: 1.0, w: 9, colW: [1.2, 1.2, 2, 2, 2.6],
      border: { pt: 0.5, color: 'E5E7EB' },
      rowH: 0.4,
    });
  }

  // ===== SLIDE 3: COMENTARIOS CLIENTE =====
  const cc = r.comentariosCliente.filter(c => c.trim());
  if (cc.length) {
    slide = pres.addSlide();
    slide.background = { color: 'FFFFFF' };
    addSlideBase(slide);
    slide.addText('Comentarios', { x: 0.6, y: 0.3, w: 7, h: 0.5, fontSize: 22, fontFace: 'Arial', color: 'CC0000', bold: true });

    const bullets = cc.map((c, i) => ({
      text: c,
      options: { bullet: true, breakLine: i < cc.length - 1, fontSize: 12, fontFace: 'Arial', color: '1A1A1A', paraSpaceAfter: 8 }
    }));
    slide.addText(bullets, { x: 0.7, y: 1.0, w: 8.5, h: 4, valign: 'top' });
  }

  // ===== SLIDE 4: COMENTARIOS TIENDA (si supermercado) =====
  if (r.esSuperMercado) {
    const ct = r.comentariosTienda.filter(c => c.trim());
    if (ct.length) {
      slide = pres.addSlide();
      slide.background = { color: 'FFFFFF' };
      addSlideBase(slide);
      slide.addText('Comentarios de Tienda', { x: 0.6, y: 0.3, w: 7, h: 0.5, fontSize: 22, fontFace: 'Arial', color: 'CC0000', bold: true });

      const bullets = ct.map((c, i) => ({
        text: c,
        options: { bullet: true, breakLine: i < ct.length - 1, fontSize: 12, fontFace: 'Arial', color: '1A1A1A', paraSpaceAfter: 8 }
      }));
      slide.addText(bullets, { x: 0.7, y: 1.0, w: 8.5, h: 4, valign: 'top' });
    }
  }

  // ===== FOTOS =====
  if (r.fotos.length) {
    // Separador
    slide = pres.addSlide();
    slide.background = { color: 'FFFFFF' };
    slide.addText([
      { text: 'FOTOGRAFÍAS DE LA', options: { breakLine: true } },
      { text: 'ACTIVIDAD' }
    ], { x: 1, y: 1.5, w: 8, h: 2, fontSize: 32, fontFace: 'Arial', color: '1A1A1A', bold: true, align: 'center' });

    // Grids de 3 fotos
    for (let i = 0; i < r.fotos.length; i += 3) {
      slide = pres.addSlide();
      slide.background = { color: 'FFFFFF' };
      addSlideBase(slide);

      const chunk = r.fotos.slice(i, i + 3);
      const photoW = chunk.length === 1 ? 6 : chunk.length === 2 ? 4 : 2.8;
      const totalW = chunk.length * photoW + (chunk.length - 1) * 0.2;
      let startX = (10 - totalW) / 2;

      chunk.forEach((f, j) => {
        const imgData = f.data.replace(/^data:image\/[a-z]+;base64,/, '');
        const mimeMatch = f.data.match(/^data:(image\/[a-z]+);/);
        const mime = mimeMatch ? mimeMatch[1] : 'image/jpeg';
        slide.addImage({
          data: mime + ';base64,' + imgData,
          x: startX + j * (photoW + 0.2),
          y: 0.5,
          w: photoW,
          h: 4.5,
          sizing: { type: 'cover', w: photoW, h: 4.5 },
        });
      });
    }
  }

  // ===== SLIDE FINAL: GRACIAS =====
  slide = pres.addSlide();
  slide.background = { color: 'FFFFFF' };
  addSlideBase(slide);
  slide.addText('GRACIAS.', { x: 1, y: 2, w: 8, h: 1.5, fontSize: 40, fontFace: 'Arial', color: 'CC0000', bold: true, align: 'center' });

  // Export
  const fileName = `Reporte_${r.marca || 'reporte'}_${r.fecha}.pptx`;
  pres.writeFile({ fileName: fileName }).then(() => {
    showToast('PPTX exportado ✓');
  }).catch(err => {
    console.error(err);
    showToast('Error al exportar PPTX');
  });
}

// ==================== RENDER ====================
function render() {
  const app = document.getElementById('app');

  if (state.showList) {
    app.innerHTML = renderReportList();
    bindListEvents();
    return;
  }

  let html = '';
  html += renderHeader();
  html += renderProgress();
  html += `<div class="content" id="content">`;
  const renderers = stepRenderers();
  html += renderers[currentStepId()]();
  html += `</div>`;
  if (currentStepId() !== 'preview') html += renderNav();
  if (state.toast) html += `<div class="toast">${esc(state.toast)}</div>`;
  html += `<div class="app-credit">Realizado por Katherine Angiulo © 2026 · <a href="https://B3ta.us" target="_blank" rel="noopener">B3ta.us</a></div>`;

  app.innerHTML = html;
  bindEvents();
}

function renderHeader() {
  return `<div class="header">
    <div class="header-left">${logoSVG(28)}<span class="header-title">Reportes</span></div>
    <button class="btn-reports" id="btnShowList">📂 Mis reportes${state.savedReports.length ? ` (${state.savedReports.length})` : ''}</button>
  </div>`;
}

function renderProgress() {
  const steps = getActiveSteps();
  let html = '<div class="progress">';
  steps.forEach((s, i) => {
    const cls = i === state.step ? 'active' : i < state.step ? 'done' : 'pending';
    html += `<button class="step-btn ${cls}" data-step="${i}"><span class="step-icon">${s.icon}</span>${s.label}</button>`;
  });
  return html + '</div>';
}

function fieldHTML(label, value, id, opts = {}) {
  const type = opts.type || 'text';
  let html = `<div class="field">`;
  if (label) html += `<label class="field-label" for="${id}">${label}</label>`;
  if (opts.multiline) {
    html += `<textarea class="field-textarea" id="${id}" placeholder="${opts.placeholder || ''}" rows="${opts.rows || 3}">${esc(value)}</textarea>`;
  } else {
    html += `<input class="field-input" type="${type}" id="${id}" value="${esc(value)}" placeholder="${opts.placeholder || ''}">`;
  }
  return html + '</div>';
}

function renderFotos() {

function renderPreview() {
  const r = state.report;
  const slides = [];
  let total = 2; // portada + gracias
  const hasTiendas = r.tiendas.some(t => t.nombre || t.lugar);
  const hasCC = r.comentariosCliente.some(c => c.trim());
  const hasCT = r.esSuperMercado && r.comentariosTienda.some(c => c.trim());
  if (hasTiendas) total++;
  if (hasCC) total++;
  if (hasCT) total++;
  if (r.fotos.length) total += 1 + Math.ceil(r.fotos.length / 3);

  let n = 0;
  const logo = `<div class="slide-logo">${logoSVG(20)}</div>`;

  // Portada
  n++;
  let s = `<div class="slide-body">${logo}<div style="text-align:center">`;
  if (r.evento) s += `<p style="font-size:11px;font-weight:600;color:var(--gray);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px">EVENTO</p>`;
  if (r.evento) s += `<p style="font-size:16px;font-weight:800;margin-bottom:2px">${esc(r.evento)}</p>`;
  s += `<p style="font-size:13px;font-weight:700;color:var(--red)">${esc(r.marca)}</p>`;
  s += `<div style="margin-top:12px;display:flex;justify-content:center;gap:14px;font-size:10px;color:var(--gray);flex-wrap:wrap">`;
  if (r.lugar) s += `<span>📍 ${esc(r.lugar)}</span>`;
  if (r.fecha) s += `<span>🗓 ${esc(r.fecha)}</span>`;
  if (r.semana) s += `<span>📅 ${esc(r.semana)}</span>`;
  if (r.grupo) s += `<span>👥 ${esc(r.grupo)}</span>`;
  if (r.supervisor) s += `<span>🧑‍💼 ${esc(r.supervisor)}</span>`;
  s += `</div></div></div>`;
  slides.push(slideCard(n, total, s));

  // Tiendas
  if (hasTiendas) {
    n++;
    s = `<div class="slide-body">${logo}<h3 style="font-size:13px;color:var(--red);margin-bottom:8px">Tiendas Apoyadas</h3>`;
    s += `<table class="slide-table"><tr><th>Fecha</th><th>Horas</th><th>Tienda</th><th>Lugar</th><th>Comentario</th></tr>`;
    r.tiendas.filter(t => t.nombre || t.lugar).forEach(t => {
      s += `<tr><td>${esc(t.fecha)}</td><td>${esc(t.horas)}</td><td style="font-weight:600">${esc(t.nombre)}</td><td>${esc(t.lugar)}</td><td style="color:var(--gray)">${esc(t.comentario)}</td></tr>`;
    });
    s += `</table></div>`;
    slides.push(slideCard(n, total, s));
  }

  // Comentarios Cliente
  if (hasCC) {
    n++;
    s = `<div class="slide-body">${logo}<h3 style="font-size:13px;color:var(--red);margin-bottom:10px">Comentarios</h3>`;
    r.comentariosCliente.filter(c => c.trim()).forEach(c => {
      s += `<div class="slide-comment"><span class="bullet" style="color:var(--yellow)">•</span><p>${esc(c)}</p></div>`;
    });
    s += `</div>`;
    slides.push(slideCard(n, total, s));
  }

  // Comentarios Tienda
  if (hasCT) {
    n++;
    s = `<div class="slide-body">${logo}<h3 style="font-size:13px;color:var(--red);margin-bottom:10px">Comentarios de Tienda</h3>`;
    r.comentariosTienda.filter(c => c.trim()).forEach(c => {
      s += `<div class="slide-comment"><span class="bullet" style="color:var(--red)">•</span><p>${esc(c)}</p></div>`;
    });
    s += `</div>`;
    slides.push(slideCard(n, total, s));
  }

  // Fotos
  if (r.fotos.length) {
    n++;
    slides.push(slideCard(n, total, `<div class="slide-body"><div style="text-align:center"><p style="font-size:18px;font-weight:800">FOTOGRAFÍAS DE LA</p><p style="font-size:18px;font-weight:800">ACTIVIDAD</p></div></div>`));
    for (let i = 0; i < r.fotos.length; i += 3) {
      n++;
      const chunk = r.fotos.slice(i, i + 3);
      s = `<div class="slide-body">${logo}<div class="slide-photo-grid" style="grid-template-columns:repeat(${chunk.length},1fr)">`;
      chunk.forEach(f => { s += `<img src="${f.data}" alt="">`; });
      s += `</div></div>`;
      slides.push(slideCard(n, total, s));
    }
  }

  // Gracias
  n++;
  slides.push(slideCard(n, total, `<div class="slide-body">${logo}<div style="text-align:center"><p style="font-size:24px;font-weight:800;color:var(--red)">GRACIAS.</p></div></div>`));

  let h = `<h2>Vista Previa</h2><p class="subtitle">Así se verá tu reporte — ${n} slides</p>`;
  h += slides.join('');
  h += `<div class="preview-actions">
    <button class="btn-save" id="btnSave">💾 Guardar</button>
    <button class="btn-export" id="btnExportPPTX">📤 Exportar PPTX</button>
  </div>`;
  h += `<div style="display:flex;gap:10px;margin-top:10px">
    <button class="btn-save" id="btnExportHTML" style="flex:1;font-size:12px;padding:10px;border-color:var(--border)">🌐 Exportar HTML</button>
    <button class="btn-save" id="btnExportJSON" style="flex:1;font-size:12px;padding:10px;border-color:var(--border)">📋 Exportar JSON</button>
  </div>`;
  h += `<p class="preview-note">Exporta directamente a PowerPoint (.pptx) con el logo oficial</p>`;
  return h;
}

function slideCard(num, total, body) {
  return `<div class="slide-card">
    <div class="slide-header">
      <span class="slide-num">SLIDE ${num}/${total}</span>
      <div class="slide-dots"><span style="background:var(--yellow)"></span><span style="background:var(--red)"></span></div>
    </div>${body}</div>`;
}

function renderNav() {
  const ok = canGoNext();
  const steps = getActiveSteps();
  const isLastBeforePreview = state.step === steps.length - 2;
  let h = `<div class="nav-bar">`;
  if (state.step > 0) h += `<button class="btn-back" id="btnBack">← Atrás</button>`;
  const label = isLastBeforePreview ? 'Ver vista previa →' : 'Siguiente →';
  h += `<button class="btn-next ${ok ? 'enabled' : 'disabled'}" id="btnNext">${label}</button>`;
  return h + '</div>';
}

function renderReportList() {
  let h = `<div style="padding:20px">`;
  h += `<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:24px">`;
  h += `<h2 style="font-size:22px;font-weight:700">Mis Reportes</h2>`;
  h += `<button class="btn-remove" id="btnCloseList" style="font-size:22px">✕</button></div>`;

  if (!state.savedReports.length) {
    h += `<div class="empty-state"><p class="icon">📂</p><p>No hay reportes guardados</p></div>`;
  } else {
    state.savedReports.forEach((r, i) => {
      h += `<div class="report-item" data-load="${i}">
        <div style="flex:1"><div class="report-item-title">${esc(r.marca || 'Sin marca')}${r.evento ? ' — ' + esc(r.evento) : ''}</div>
        <div class="report-item-meta">📍 ${esc(r.lugar || 'Sin lugar')} • 📅 ${r.fecha} • 📸 ${r.fotos?.length || 0}</div></div>
        <button class="btn-remove" data-del="${i}" style="font-size:16px">🗑</button>
      </div>`;
    });
  }
  h += `<button class="btn-new-report" id="btnNewReport">+ Nuevo Reporte</button>`;
  h += `<div class="app-credit" style="margin-top:24px">Realizado por Katherine Angiulo © 2026 · <a href="https://B3ta.us" target="_blank" rel="noopener">B3ta.us</a></div>`;
  h += `</div>`;
  return h;
}

// ==================== EVENTS ====================
function collectGeneralFields() {
  const r = state.report;
  const v = id => { const el = document.getElementById(id); return el ? el.value : ''; };
  r.marca = v('f_marca'); r.evento = v('f_evento'); r.lugar = v('f_lugar');
  r.semana = v('f_semana'); r.grupo = v('f_grupo'); r.supervisor = v('f_supervisor'); r.fecha = v('f_fecha');
  const cb = document.getElementById('f_supermarket');
  if (cb) r.esSuperMercado = cb.checked;
}

function collectTiendaFields() {
  state.report.tiendas.forEach((t, i) => {
    const v = id => { const el = document.getElementById(id); return el ? el.value : ''; };
    t.fecha = v(`t_fecha_${i}`); t.horas = v(`t_horas_${i}`);
    t.nombre = v(`t_nombre_${i}`); t.lugar = v(`t_lugar_${i}`); t.comentario = v(`t_com_${i}`);
  });
}

function collectCommentFields() {
  state.report.comentariosCliente.forEach((_, i) => {
    const el = document.getElementById(`cc_${i}`);
    if (el) state.report.comentariosCliente[i] = el.value;
  });
  state.report.comentariosTienda.forEach((_, i) => {
    const el = document.getElementById(`ct_${i}`);
    if (el) state.report.comentariosTienda[i] = el.value;
  });
}

function collectCurrentStep() {
  const id = currentStepId();
  if (id === 'general') collectGeneralFields();
  if (id === 'tiendas') collectTiendaFields();
  if (id === 'comentarios') collectCommentFields();
}

function bindEvents() {
  // Header
  document.getElementById('btnShowList')?.addEventListener('click', () => { collectCurrentStep(); state.showList = true; render(); });

  // Step buttons
  document.querySelectorAll('.step-btn').forEach(btn => {
    btn.addEventListener('click', () => { collectCurrentStep(); state.step = parseInt(btn.dataset.step); render(); });
  });

  // Navigation
  document.getElementById('btnBack')?.addEventListener('click', () => { collectCurrentStep(); state.step--; render(); });
  document.getElementById('btnNext')?.addEventListener('click', () => {
    collectCurrentStep();
    if (canGoNext()) { state.step++; render(); document.getElementById('content')?.scrollTo(0, 0); }
  });

  // General fields - live update for validation
  ['f_marca', 'f_lugar'].forEach(id => {
    document.getElementById(id)?.addEventListener('input', () => {
      collectGeneralFields();
      const btn = document.getElementById('btnNext');
      if (btn) { btn.className = 'btn-next ' + (canGoNext() ? 'enabled' : 'disabled'); }
    });
  });

  // Supermarket checkbox - toggles tiendas step visibility
  document.getElementById('f_supermarket')?.addEventListener('change', () => {
    collectGeneralFields();
    // Clamp step index to valid range for new active steps
    const steps = getActiveSteps();
    if (state.step >= steps.length) state.step = steps.length - 1;
    render();
  });

  // Tiendas
  document.getElementById('btnAddTienda')?.addEventListener('click', () => {
    collectTiendaFields();
    state.report.tiendas.push({ fecha: '', horas: '', nombre: '', lugar: '', comentario: '' });
    render();
  });
  document.querySelectorAll('[data-remove-tienda]').forEach(btn => {
    btn.addEventListener('click', () => { collectTiendaFields(); state.report.tiendas.splice(parseInt(btn.dataset.removeTienda), 1); render(); });
  });

  // Comments
  document.getElementById('btnAddCC')?.addEventListener('click', () => { collectCommentFields(); state.report.comentariosCliente.push(''); render(); });
  document.getElementById('btnAddCT')?.addEventListener('click', () => { collectCommentFields(); state.report.comentariosTienda.push(''); render(); });
  document.querySelectorAll('[data-remove-cc]').forEach(btn => {
    btn.addEventListener('click', () => { collectCommentFields(); state.report.comentariosCliente.splice(parseInt(btn.dataset.removeCc), 1); render(); });
  });
  document.querySelectorAll('[data-remove-ct]').forEach(btn => {
    btn.addEventListener('click', () => { collectCommentFields(); state.report.comentariosTienda.splice(parseInt(btn.dataset.removeCt), 1); render(); });
  });

  // Photos - Drop zone
  const dropZone = document.getElementById('dropZone');
  const photoInput = document.getElementById('photoInput');
  if (dropZone && photoInput) {
    dropZone.addEventListener('click', () => photoInput.click());
    photoInput.addEventListener('change', handlePhotoInput);

    dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('dragover'); });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
    dropZone.addEventListener('drop', (e) => {
      e.preventDefault(); dropZone.classList.remove('dragover');
      const files = Array.from(e.dataTransfer.files).filter(f => f.type.startsWith('image/'));
      if (files.length) processFiles(files);
    });
  }

  // Photos - Remove
  document.querySelectorAll('[data-remove-photo]').forEach(btn => {
    btn.addEventListener('click', (e) => { e.stopPropagation(); removePhoto(parseInt(btn.dataset.removePhoto)); });
  });

  // Photos - Drag to reorder
  let dragIdx = null;
  document.querySelectorAll('.photo-cell[draggable]').forEach(cell => {
    cell.addEventListener('dragstart', (e) => {
      dragIdx = parseInt(cell.dataset.photoIdx);
      cell.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
    });
    cell.addEventListener('dragend', () => { cell.classList.remove('dragging'); dragIdx = null; });
    cell.addEventListener('dragover', (e) => { e.preventDefault(); cell.classList.add('drag-over'); });
    cell.addEventListener('dragleave', () => cell.classList.remove('drag-over'));
    cell.addEventListener('drop', (e) => {
      e.preventDefault(); e.stopPropagation();
      cell.classList.remove('drag-over');
      const dropIdx = parseInt(cell.dataset.photoIdx);
      if (dragIdx !== null && dragIdx !== dropIdx) {
        const fotos = state.report.fotos;
        const moved = fotos.splice(dragIdx, 1)[0];
        fotos.splice(dropIdx, 0, moved);
        render();
      }
    });
  });

  // Preview actions
  document.getElementById('btnSave')?.addEventListener('click', saveReport);
  document.getElementById('btnExportPPTX')?.addEventListener('click', exportPPTX);
  document.getElementById('btnExportHTML')?.addEventListener('click', exportHTML);
  document.getElementById('btnExportJSON')?.addEventListener('click', exportJSON);
}

function bindListEvents() {
  document.getElementById('btnCloseList')?.addEventListener('click', () => { state.showList = false; render(); });
  document.getElementById('btnNewReport')?.addEventListener('click', () => { state.report = newReport(); state.step = 0; state.showList = false; render(); });
  document.querySelectorAll('[data-load]').forEach(el => {
    el.addEventListener('click', (e) => {
      if (e.target.closest('[data-del]')) return;
      state.report = JSON.parse(JSON.stringify(state.savedReports[parseInt(el.dataset.load)]));
      state.step = 0; state.showList = false; render();
    });
  });
  document.querySelectorAll('[data-del]').forEach(btn => {
    btn.addEventListener('click', (e) => { e.stopPropagation(); deleteReport(state.savedReports[parseInt(btn.dataset.del)].id); });
  });
}

// ==================== INIT ====================
loadReports();
render();
</script>
</body>
